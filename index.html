<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kostelníci.cz – Terezička</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #f7f5f2;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #7c5c3b;
        --accent-soft: #efe6dc;
        --ok: #ecfdf5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
      .hero, .card, .modal-box, .overview-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      .hero { padding: 28px; margin-bottom: 20px; }
      .pill {
        display: inline-block; padding: 8px 12px; border-radius: 999px; background: var(--accent-soft);
        color: var(--accent); font-size: 14px; font-weight: 600; margin-bottom: 14px;
      }
      h1 { margin: 0 0 8px; font-size: 36px; line-height: 1.1; }
      .sub { color: var(--muted); max-width: 900px; line-height: 1.5; }
      .hint {
        margin-top: 18px; padding: 16px; border-radius: 18px; background: #fafaf9; border: 1px solid var(--line); color: var(--muted);
      }
      .today-box {
        margin-bottom: 16px; padding: 14px 16px; border-radius: 18px; background: var(--ok); border: 1px solid #d1fae5;
      }
      .overview {
        display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px;
      }
      .overview-card { padding: 16px; border-radius: 18px; }
      .overview-card strong { display: block; margin-bottom: 6px; }
      .days {
        display: flex; gap: 10px; overflow: auto; padding-bottom: 8px; margin-bottom: 18px;
      }
      .day-btn {
        min-width: 155px; border: 1px solid var(--line); background: white; border-radius: 18px; padding: 14px; text-align: left; cursor: pointer;
      }
      .day-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
      .day-btn small { display: block; opacity: .85; margin-top: 4px; }
      .section-title { margin: 6px 0 14px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .card { padding: 20px; }
      .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
      .time { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
      .type { color: var(--muted); }
      .btn {
        border: 1px solid var(--line); background: white; border-radius: 14px; padding: 10px 14px; cursor: pointer; font-weight: 600;
      }
      .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
      .status {
        display: inline-flex; align-items: center; padding: 7px 11px; border-radius: 999px; font-size: 13px; font-weight: 700;
      }
      .status-green { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
      .status-yellow { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
      .status-red { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
      .row { margin: 14px 0; }
      .label { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
      .value { font-size: 16px; }
      .badges { display: flex; flex-wrap: wrap; gap: 8px; }
      .badge {
        padding: 7px 10px; border-radius: 999px; border: 1px solid var(--line); background: #fff; font-size: 14px;
      }
      .badge.empty { color: var(--muted); background: #fafafa; }
      .month-title { margin: 24px 0 12px; font-size: 22px; }
      .modal {
        position: fixed; inset: 0; background: rgba(0,0,0,.38); display: none; align-items: center; justify-content: center; padding: 16px;
      }
      .modal.open { display: flex; }
      .modal-box { width: 100%; max-width: 860px; padding: 22px; }
      .modal-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
      .fields { display: grid; gap: 14px; }
      input {
        width: 100%; border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; font: inherit;
      }
      .acolytes-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .save-note { margin-top: 14px; color: var(--muted); font-size: 14px; }
      .warn { color: #991b1b; font-weight: 600; }
      @media (max-width: 900px) {
        .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 760px) {
        h1 { font-size: 28px; }
        .grid { grid-template-columns: 1fr; }
        .top { flex-direction: column; }
        .btn { width: 100%; }
        .acolytes-grid { grid-template-columns: 1fr; }
        .overview { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div class="pill">Kostelníci.cz • Terezička</div>
        <h1>Rozpis služeb u Terezičky</h1>
        <div class="sub">
          Sdílený online rozpis pro kněze, akolyty a lektory. Změny se po uložení projeví všem uživatelům. Týdny se generují z pravidelného rozvrhu Terezičky a lze je kdykoli upravit.
        </div>
        <div class="hint">
        </div>
      </div>

      <div id="todayBox" class="today-box"></div>
      <div id="overview" class="overview"></div>
      <div id="days" class="days"></div>
      <h2 id="sectionTitle" class="section-title"></h2>
      <div id="cards" class="grid"></div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-box">
        <div class="modal-head">
          <div>
            <strong>Upravit službu</strong>
            <div id="modalMeta" class="sub" style="font-size:14px"></div>
          </div>
          <button class="btn" onclick="closeModal()">Zavřít</button>
        </div>
        <div class="fields">
          <div>
            <div class="label">Kněz</div>
            <input id="priestInput" placeholder="Např. P. Jan" />
          </div>
          <div>
            <div class="label">Akolyté / podávání sv. přijímání</div>
            <div class="acolytes-grid">
              <input id="acolyte1Input" placeholder="Akolyta 1" />
              <input id="acolyte2Input" placeholder="Akolyta 2" />
              <input id="acolyte3Input" placeholder="Akolyta 3" />
              <input id="acolyte4Input" placeholder="Akolyta 4" />
              <input id="acolyte5Input" placeholder="Akolyta 5" />
              <input id="acolyte6Input" placeholder="Akolyta 6" />
            </div>
          </div>
          <div>
            <div class="label">1. čtení</div>
            <input id="reader1Input" placeholder="Jméno" />
          </div>
          <div>
            <div class="label">2. čtení</div>
            <input id="reader2Input" placeholder="Jméno" />
          </div>
          <button class="btn btn-primary" onclick="saveModal()">Uložit</button>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = 'https://erkrbzqomdofoiaatawt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya3JienFvbWRvZm9pYXRhYXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjQzMDQsImV4cCI6MjA4ODY0MDMwNH0.-2vCFpRjQJRInIvTyK5UbMl7bOocp7oFYP3PisLpBbQ';

      const { createClient } = supabase;

      const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const scheduleTemplate = {
        1: [{ time: '6:30', type: 'Ranní mše' }, { time: '18:30', type: 'Večerní mše' }],
        2: [{ time: '6:30', type: 'Ranní mše' }, { time: '18:30', type: 'Mše pro mládež' }],
        3: [{ time: '6:30', type: 'Ranní mše' }, { time: '17:00', type: 'Mše pro děti' }, { time: '18:30', type: 'Večerní mše' }],
        4: [{ time: '6:30', type: 'Ranní mše' }, { time: '18:30', type: 'Večerní mše' }],
        5: [{ time: '6:30', type: 'Ranní mše' }, { time: '18:30', type: 'Večerní mše' }],
        6: [{ time: '6:30', type: 'Ranní mše' }, { time: '18:30', type: 'Večerní mše' }],
        0: [{ time: '7:30', type: 'Ranní mše' }, { time: '9:00', type: 'Mše s rytmickým zpěvem' }, { time: '10:30', type: 'Farní mše' }, { time: '18:30', type: 'Večerní mše' }],
      };

      const dayNames = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
      const monthNames = ['leden', 'únor', 'březen', 'duben', 'květen', 'červen', 'červenec', 'srpen', 'září', 'říjen', 'listopad', 'prosinec'];

      const serviceMap = new Map();
      let selectedDayKey = null;
      let editing = { key: null, index: null };
      let realtimeChannel = null;

      function toDateKey(date) {
        return date.toISOString().slice(0, 10);
      }

      function formatDateLabel(date) {
        return `${dayNames[date.getDay()]} ${date.getDate()}. ${date.getMonth() + 1}. ${date.getFullYear()}`;
      }

      function startOfWeek(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        d.setHours(0,0,0,0);
        return d;
      }

      function generateDays(weeksAhead = 12) {
        const start = startOfWeek(new Date());
        const days = [];
        for (let i = 0; i < weeksAhead * 7; i++) {
          const date = new Date(start);
          date.setDate(start.getDate() + i);
          const key = toDateKey(date);
          const weekday = date.getDay();
          const masses = scheduleTemplate[weekday].map((m) => ({
            date_key: key,
            dayName: dayNames[weekday],
            dateLabel: formatDateLabel(date),
            time: m.time,
            type: m.type,
            priest: '',
            acolytes: [],
            reader1: '',
            reader2: '',
          }));
          days.push({ key, date, dayName: dayNames[weekday], dateLabel: formatDateLabel(date), masses });
        }
        return days;
      }

      function getMergedDays() {
        const days = generateDays();
        return days.map((day) => ({
          ...day,
          masses: day.masses.map((mass) => {
            const recordKey = `${mass.date_key}_${mass.time}`;
            const db = serviceMap.get(recordKey);
            return db ? { ...mass, ...db } : mass;
          })
        }));
      }

      function badges(items) {
        if (!items || !items.length) return '<span class="badge empty">Zatím nikdo</span>';
        return items.map((x) => `<span class="badge">${x}</span>`).join('');
      }

      function textOrEmpty(v) {
        return v && v.trim() ? v : 'Zatím není zapsáno';
      }

      function getRequiredAcolytes(dayName) {
        return dayName === 'Neděle' ? 4 : 2;
      }

      function getStatus(mass, dayName) {
        const acolytesCount = (mass.acolytes || []).filter(Boolean).length;
        const required = getRequiredAcolytes(dayName);
        const hasPriest = !!(mass.priest && mass.priest.trim());
        const hasReader1 = !!(mass.reader1 && mass.reader1.trim());
        const hasReader2 = !!(mass.reader2 && mass.reader2.trim());
        const filledSomething = hasPriest || hasReader1 || hasReader2 || acolytesCount > 0;
        if (!filledSomething) return { label: 'Neobsazeno', cls: 'status-red' };
        if (hasPriest && hasReader1 && hasReader2 && acolytesCount >= required) return { label: 'Obsazeno', cls: 'status-green' };
        return { label: `Částečně obsazeno`, cls: 'status-yellow' };
      }

      function getOverviewCounts(days) {
        let green = 0, yellow = 0, red = 0, total = 0;
        days.forEach((day) => day.masses.forEach((mass) => {
          total += 1;
          const cls = getStatus(mass, day.dayName).cls;
          if (cls === 'status-green') green += 1;
          else if (cls === 'status-yellow') yellow += 1;
          else red += 1;
        }));
        return { total, green, yellow, red };
      }

      function render() {
        const days = getMergedDays();
        if (!selectedDayKey) selectedDayKey = toDateKey(new Date());
        const selectedDay = days.find((d) => d.key === selectedDayKey) || days[0];
        selectedDayKey = selectedDay.key;

        document.getElementById('todayBox').innerHTML = `<strong>Dnes:</strong> ${formatDateLabel(new Date())}. <span style="color:#6b7280">Změny se po uložení sdílí všem připojeným uživatelům.</span>`;

        const counts = getOverviewCounts(days);
        document.getElementById('overview').innerHTML = `
          <div class="overview-card"><strong>Celkem mší</strong>${counts.total}</div>
          <div class="overview-card"><strong style="color:#166534;">Obsazeno</strong>${counts.green}</div>
          <div class="overview-card"><strong style="color:#92400e;">Částečně</strong>${counts.yellow}</div>
          <div class="overview-card"><strong style="color:#991b1b;">Neobsazeno</strong>${counts.red}</div>
        `;

        document.getElementById('days').innerHTML = days.slice(0, 28).map((day) => `
          <button class="day-btn ${day.key === selectedDayKey ? 'active' : ''}" onclick="selectDay('${day.key}')">
            <strong>${day.dayName}${day.key === toDateKey(new Date()) ? ' • dnes' : ''}</strong>
            <small>${day.dateLabel}</small>
          </button>
        `).join('');

        document.getElementById('sectionTitle').textContent = selectedDay.dateLabel;
        document.getElementById('cards').innerHTML = selectedDay.masses.map((mass, i) => {
          const status = getStatus(mass, selectedDay.dayName);
          const required = getRequiredAcolytes(selectedDay.dayName);
          const actual = (mass.acolytes || []).filter(Boolean).length;
          const missing = Math.max(0, required - actual);
          return `
            <div class="card">
              <div class="top">
                <div>
                  <div class="time">${mass.time}</div>
                  <div class="type">${mass.type}</div>
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
                  <span class="status ${status.cls}">${status.label}</span>
                  <button class="btn" onclick="openModal('${selectedDay.key}', ${i})">Zapsat / upravit</button>
                </div>
              </div>
              <div class="row"><div class="label">Kněz</div><div class="value">${textOrEmpty(mass.priest)}</div></div>
              <div class="row"><div class="label">Akolyté</div><div class="badges">${badges(mass.acolytes)}</div></div>
              <div class="row"><div class="label">1. čtení</div><div class="value">${textOrEmpty(mass.reader1)}</div></div>
              <div class="row"><div class="label">2. čtení</div><div class="value">${textOrEmpty(mass.reader2)}</div></div>
              <div class="row"><div class="label">Požadovaný počet akolytů</div><div class="value">${required}${missing > 0 ? ` • <span class="warn">chybí ještě ${missing}</span>` : ''}</div></div>
            </div>
          `;
        }).join('');
      }

      function selectDay(key) {
        selectedDayKey = key;
        render();
      }

      function openModal(dayKey, massIndex) {
        const days = getMergedDays();
        const day = days.find((d) => d.key === dayKey);
        const mass = day.masses[massIndex];
        editing = { key: dayKey, index: massIndex };
        document.getElementById('modalMeta').textContent = `${day.dateLabel} • ${mass.time} • ${mass.type}`;
        document.getElementById('priestInput').value = mass.priest || '';
        const acolytes = mass.acolytes || [];
        for (let i = 0; i < 6; i++) {
          document.getElementById(`acolyte${i + 1}Input`).value = acolytes[i] || '';
        }
        document.getElementById('reader1Input').value = mass.reader1 || '';
        document.getElementById('reader2Input').value = mass.reader2 || '';
        document.getElementById('modal').classList.add('open');
      }

      function closeModal() {
        document.getElementById('modal').classList.remove('open');
      }

      async function saveModal() {
        if (!client) {
          alert('Nejdřív doplň SUPABASE_URL a SUPABASE_ANON_KEY v kódu.');
          return;
        }
        const days = getMergedDays();
        const day = days.find((d) => d.key === editing.key);
        const mass = day.masses[editing.index];
        const payload = {
          church_slug: 'terezicka',
          date_key: day.key,
          day_name: day.dayName,
          date_label: day.dateLabel,
          time: mass.time,
          mass_type: mass.type,
          priest: document.getElementById('priestInput').value.trim(),
          acolytes: [1,2,3,4,5,6].map((i) => document.getElementById(`acolyte${i}Input`).value.trim()).filter(Boolean),
          reader1: document.getElementById('reader1Input').value.trim(),
          reader2: document.getElementById('reader2Input').value.trim(),
          updated_at: new Date().toISOString()
        };

        const { error } = await client.from('mass_services').upsert(payload, { onConflict: 'church_slug,date_key,time' });
        if (error) {
          alert('Nepodařilo se uložit změny: ' + error.message);
          return;
        }
        serviceMap.set(`${payload.date_key}_${payload.time}`, payload);
        closeModal();
        render();
      }

      async function loadServices() {
        if (!client) {
          render();
          return;
        }
        const start = toDateKey(startOfWeek(new Date()));
        const endDate = new Date(startOfWeek(new Date()));
        endDate.setDate(endDate.getDate() + 84);
        const end = toDateKey(endDate);

        const { data, error } = await client
          .from('mass_services')
          .select('*')
          .eq('church_slug', 'terezicka')
          .gte('date_key', start)
          .lte('date_key', end)
          .order('date_key', { ascending: true })
          .order('time', { ascending: true });

        if (error) {
          console.error(error);
          render();
          return;
        }

        serviceMap.clear();
        (data || []).forEach((row) => {
          serviceMap.set(`${row.date_key}_${row.time}`, row);
        });
        render();
      }

      function subscribeRealtime() {
        if (!client) return;
        if (realtimeChannel) client.removeChannel(realtimeChannel);
        realtimeChannel = client
          .channel('mass-services-live')
          .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'mass_services',
            filter: 'church_slug=eq.terezicka'
          }, () => loadServices())
          .subscribe();
      }

      loadServices();
      subscribeRealtime();
    </script>
  </body>
</html>
